# ARGOS RAG corpus manifest v1
#
# Purpose:
#   Candidate knowledge base for the first RAG experiment focused on focal liver
#   lesions in MRI. This is a planning/audit manifest, not downloaded article text.
#
# Use policy:
#   - Do not commit patient data here.
#   - Do not copy closed guideline text into the repo.
#   - Felipe approved all listed sources for corpus v1 research use.
#   - Preserve URL/PMCID/DOI provenance for every ingested chunk.

corpus_version: liver_mri_rag_v1
created_for: ARGOS / MedGemma liver MRI RAG
language: en
clinical_scope:
  modality: MRI
  organ: liver
  task: focal_liver_lesion_detection_and_characterization_support
regulatory_scope: RESEARCH
decisions:
  corpus_option: "B without EASL"
  include_guidelines_as: "public/open review articles or original summaries only"
  primary_rag_use: "grounding, consistency, differential support, abstention"
  primary_benchmark_label: "binary positive/negative exam labels"
  not_validated_for:
    - clinical_diagnosis
    - fine_segmental_localization
    - claim_that_model_reasoning_is_clinically_correct
license_policy:
  default_status: approved_by_felipe_for_research_corpus_v1
  approval_statement: "Felipe approved all 41 listed sources for corpus v1 research ingestion."
  ingest_rule: "ingest_approved_sources_with_full_provenance; do_not_copy_closed_guideline_text_beyond_approved_sources"
  allowed_sources:
    - PMC
    - open_access_journals
    - team_authored_summaries_with_citations

coverage_targets:
  general_focal_liver_lesions_mri: covered
  benign_liver_lesions: covered
  hcc: covered
  li_rads: covered
  aasld: covered
  gadoxetic_acid_hepatobiliary_phase: covered
  dwi_adc: covered
  hemangioma: covered
  fnh: covered
  hepatic_adenoma: covered
  metastases: covered
  cholangiocarcinoma: covered
  cystic_liver_lesions: covered
  pseudolesions_pitfalls: covered
  couinaud_segmental_anatomy: covered
  liver_mri_protocol: covered
  inflammatory_mimickers: covered
  normal_liver_mri: partial
remaining_non_blocking_gaps:
  - "Dedicated normal multiparametric liver MRI enhancement pattern review."
  - "Dedicated hepatic abscess/infectious mimicker MRI review."
  - "Dedicated liver MRI artifacts/image-quality pitfalls review."

priority_legend:
  core: "Recommended for corpus v1 ingestion."
  support: "Useful supporting/redundant source; include if chunk quality is acceptable."
  optional: "Not required for v1 unless a specific gap remains."

