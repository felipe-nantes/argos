name: tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install (núcleo + dev, sem GPU/torch)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Preflight (doctor — não roda segmentação)
        run: python digital_twin.py doctor

      - name: Run test suite
        run: python -m pytest -q
