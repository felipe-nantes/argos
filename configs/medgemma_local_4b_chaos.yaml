# MedGemma 1.5 4B — painel MULTI-CONTRASTE (fusão RGB) para CONTROLES SAUDÁVEIS (CHAOS).
# O CHAOS não tem fases dinâmicas (art/pv/del); tem T1 in/out-phase (co-registrados)
# e T2. Este perfil funde R=T1in, G=T1out, B=T2 (T2 reamostrado à grade do T1) e mede
# especificidade: em fígado saudável, o esperado é NEGATIVA.
medgemma_screening:
  enabled: true
  organ: liver
  modality: MRI
  regulatory_mode: RESEARCH
  lesion_pre_marked: false

  panel:
    mode: multiphase_fusion
    axial_slices: 9
    tile_size: 384
    include_coronal: true
    include_sagittal: true
    overlay_mode: contour
    contour_width: 1
    contour_color_rgb: [255, 255, 255]
    preserve_grayscale_signal: false
    window_percentile_low: 2.0
    window_percentile_high: 98.0
    window_scope: liver
    crop_to_liver: true
    crop_margin_frac: 0.08
    background_dim: 0.35
    fusion:
      channel_map:
        red: t1in
        green: t1out
        blue: t2

  validation:
    min_liver_voxels: 300
    max_liver_fraction: 0.8

  privacy:
    remove_png_metadata: true
    require_visible_phi_confirmation: true

  medgemma:
    enabled: true
    provider: http_json_v1
    model_family: MedGemma
    model_version: "MedGemma 1.5 4B Instruction-Tuned"
    model_parameter_scale: "4B"
    model_id: "google/medgemma-1.5-4b-it"
    backend_configured: true
    model_available: true
    endpoint_url: "http://127.0.0.1:8001/generate"
    healthcheck_url: "http://127.0.0.1:8001/health"
    timeout_seconds: 300
    minimum_timeout_seconds: 120
    max_retries: 0
    max_input_bytes: 10485760
    max_image_pixels: 4000000
    max_prompt_chars: 12000
    max_output_tokens: 1536
    minimum_cuda_memory_gb: 6.0
    execution_mode: local
    device: cuda
    quantization: bitsandbytes-nf4
    local_files_only: true
    allow_remote: false

  output:
    save_panel_png: true
    save_manifest_json: true
    save_report_json: true

  report:
    allowed_states: [POSITIVA, NEGATIVA, INCONCLUSIVA]
    allowed_confidence: [baixa, moderada, alta]
    requires_human_review: true
    disclaimer: "Uso em pesquisa. Não destinado à decisão clínica. Não é diagnóstico nem laudo médico. Revisão médica obrigatória."

  prompt:
    template: |-
      Você está analisando uma montagem de RM abdominal em modo de pesquisa.

      Esta é uma imagem DERIVADA: três sequências de RM co-registradas foram fundidas em canais de cor RGB. Vermelho = T1 in-phase, Verde = T1 out-phase, Azul = T2. O fígado está delimitado por um contorno branco. Não há lesão previamente marcada. Avalie somente o parênquima hepático dentro da região segmentada.

      Interprete a cor pelo comportamento entre as sequências: o parênquima hepático normal é relativamente homogêneo e tende a aparecer acinzentado/esbranquiçado de forma uniforme. Uma lesão focal costuma destoar da vizinhança em uma ou mais sequências — por exemplo, muito brilhante em T2 (azul intenso) ou com queda de sinal entre in-phase e out-phase — aparecendo como uma mancha focal de cor distinta. Procure regiões focais cuja cor destoe do parênquima adjacente.

      Sua tarefa é identificar se existe evidência visual de possível anormalidade focal hepática. Isto não é diagnóstico e não é laudo médico. Revisão humana obrigatória por radiologista, cirurgião ou médico pesquisador.

      Responda obrigatoriamente com um único objeto JSON, sem Markdown, sem emitir diagnóstico definitivo e sem recomendar conduta clínica.

      Classifique resultado_hipotese em exatamente uma categoria:
      - POSITIVA: há possível anormalidade visual no fígado segmentado.
      - NEGATIVA: não há evidência visual suficiente de anormalidade focal nas imagens fornecidas.
      - INCONCLUSIVA: a qualidade, quantidade ou apresentação das imagens não permite avaliação confiável.

      Use exatamente este schema:
      {
        "resultado_hipotese": "POSITIVA | NEGATIVA | INCONCLUSIVA",
        "resumo_do_achado": "string",
        "localizacao_aproximada": "string",
        "sinais_visuais_observados": ["string"],
        "confianca": "baixa | moderada | alta",
        "limitacoes_da_analise": ["string"],
        "necessidade_de_revisao_humana": true
      }

      Importante:
      - Não afirme que o paciente tem ou não tem câncer, tumor ou doença.
      - Não recomende tratamento, cirurgia, biópsia ou medicação.
      - Não substitua avaliação de radiologista ou cirurgião.
      - Baseie-se apenas nas imagens fornecidas.
      - A resposta destina-se exclusivamente a pesquisa e educação.
